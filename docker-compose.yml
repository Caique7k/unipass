services:
  postgres:
    image: postgres:15
    container_name: unipass_postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: unipass_backend
    restart: always
    env_file:
      - path: ./backend/.env
        format: raw
    environment:
      DATABASE_URL: postgresql://unipass:unipass123@postgres:5432/unipass_db
      HOST: 0.0.0.0
      PORT: 4000
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
    container_name: unipass_frontend
    restart: always
    env_file:
      - path: ./frontend/.env.local
        format: raw
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
